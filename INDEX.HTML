<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDITOR PAKET KOMPLIT</title>

    <style>
        /* CSS: PAKAIAN & SENSOR SENTUH (BIAR GAK GOBLOK) */
        
        body {
            background-color: #0a0a0a; /* Hitam pekat biar adem di mata */
            color: #d1d1d1;
            font-family: 'Verdana', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none; /* Biar teks gak ke-blok pas disentuh */
            touch-action: manipulation;
        }

        h2 {
            color: #00ffaa;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,255,170,0.3);
        }

        /* LAYAR MONITOR */
        canvas {
            border: 4px solid #333;
            border-radius: 12px;
            max-width: 100%;
            height: auto;
            background-color: #000;
        }

        /* PANEL KONTROL GEDE */
        .panel {
            background: #151515;
            width: 90%;
            max-width: 500px;
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Jarak jauh biar gak salah pencet */
        }

        label {
            font-size: 18px;
            font-weight: bold;
            color: #00aaff;
        }

        /* INPUT & SLIDER RAKSASA */
        input[type="file"] {
            background: #222;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 16px;
        }

        input[type="range"] {
            width: 100%;
            height: 50px; /* Slider tinggi biar gampang digeser */
        }

        /* TOMBOL SIMPAN */
        .btn-simpan {
            background: linear-gradient(to bottom, #ff0055, #cc0044);
            color: white;
            border: none;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #880033;
        }

        .btn-simpan:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h2>GREEN SCREEN EDITOR</h2>

    <canvas id="mainCanvas"></canvas>

    <div class="panel">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <label>1. PILIH VIDEO HIJAU</label>
            <input type="file" id="upVideo" accept="video/*">
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <label>2. PILIH BACKGROUND</label>
            <input type="file" id="upBg" accept="image/*">
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <label>3. ATUR PENGHAPUS (THRESHOLD)</label>
            <input type="range" id="rangeHapus" min="0" max="255" value="110">
        </div>

        <button class="btn-simpan" id="btnDownload">SIMPAN HASIL (PNG)</button>
    </div>

    <video id="videoMentah" loop muted playsinline style="display:none"></video>

    <script>
        // JAVASCRIPT: OTAK SISTEM
        
        const video = document.getElementById('videoMentah');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        const upVideo = document.getElementById('upVideo');
        const upBg = document.getElementById('upBg');
        const slider = document.getElementById('rangeHapus');
        const btnDown = document.getElementById('btnDownload');

        const bgImg = new Image();

        // 1. Logika Ambil Video
        upVideo.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                video.src = URL.createObjectURL(file);
                video.play();
            }
        };

        // 2. Logika Ambil Background
        upBg.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                bgImg.src = URL.createObjectURL(file);
            }
        };

        // 3. Fungsi Render Loop (Hapus Hijau)
        function render() {
            if (video.paused || video.ended) {
                requestAnimationFrame(render);
                return;
            }

            // Atur ukuran canvas
            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // A. Gambar Background
            if (bgImg.src) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // B. Proses Green Screen (Canvas Sementara)
            const tmp = document.createElement('canvas');
            tmp.width = canvas.width;
            tmp.height = canvas.height;
            const tCtx = tmp.getContext('2d');

            tCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            let frame = tCtx.getImageData(0, 0, canvas.width, canvas.height);
            let pxl = frame.data.length;
            let thr = slider.value;

            for (let i = 0; i < pxl; i += 4) {
                let r = frame.data[i];
                let g = frame.data[i+1];
                let b = frame.data[i+2];

                // Jika HIJAU dominan, hapus!
                if (g > r && g > b && g > thr) {
                    frame.data[i+3] = 0; // Transparan
                }
            }

            tCtx.putImageData(frame, 0, 0);
            ctx.drawImage(tmp, 0, 0);

            requestAnimationFrame(render);
        }

        // 4. Download
        btnDown.onclick = () => {
            const link = document.createElement('a');
            link.download = 'hasil_edit.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        video.addEventListener('play', render);

    </script>
</body>
</html>
