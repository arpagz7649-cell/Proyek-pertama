<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Green Screen Pro</title>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }

        h2 { color: #00ccff; margin-bottom: 15px; }

        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95%;
            height: auto;
            background-color: #000;
        }

        .panel-kontrol {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .grup-input { display: flex; flex-direction: column; gap: 5px; }

        label { font-size: 14px; font-weight: bold; color: #bbb; }

        input[type="file"] {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 5px;
            color: #fff;
            border: 1px solid #444;
        }

        input[type="range"] { width: 100%; cursor: pointer; }

        button {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        /* Sembunyikan video asli agar tidak mengganggu */
        #vSource { display: none; }
    </style>
</head>
<body>

    <h2>VIDEO EDITOR PRO</h2>

    <canvas id="outputCanvas"></canvas>

    <div class="panel-kontrol">
        <div class="grup-input">
            <label>1. Upload Video (Green Screen):</label>
            <input type="file" id="videoUpload" accept="video/*">
        </div>

        <div class="grup-input">
            <label>2. Ganti Background (Foto):</label>
            <input type="file" id="bgUpload" accept="image/*">
        </div>

        <div class="grup-input">
            <label>Ketajaman Hapus (Threshold):</label>
            <input type="range" id="threshold" min="0" max="255" value="110">
        </div>

        <button id="downloadBtn">SIMPAN HASIL (PNG)</button>
    </div>

    <video id="vSource" loop muted playsinline></video>

    <script src="script.js"></script>

</body>
</html>
